<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合約系統｜悠勢科技</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 20px 48px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 36px 40px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    transition: max-width 0.25s ease;
}
.card.wide { max-width: 720px; }

.logo { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.logo img { width: 28px; height: 28px; object-fit: contain; }
.logo span { font-size: 12px; color: #aaa; letter-spacing: 1px; }
h1 { font-size: 20px; color: #1a2332; margin-bottom: 20px; }

/* Tabs */
.tabs {
    display: flex;
    border-bottom: 2px solid #f0f2f5;
    margin-bottom: 24px;
}
.tab-btn {
    padding: 9px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    font-size: 14px;
    font-weight: 600;
    color: #8a97a8;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    letter-spacing: 0.5px;
}
.tab-btn:hover { color: #3b6fd4; }
.tab-btn.active { color: #3b6fd4; border-bottom-color: #3b6fd4; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Convert tab ── */
.flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
    padding: 10px 0;
    border-top: 1px solid #f0f2f5;
    border-bottom: 1px solid #f0f2f5;
}
.pill { background: #eef4ff; color: #3b6fd4; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.arrow { color: #c0cad8; font-size: 18px; }
.drop-zone {
    border: 2px dashed #d0d8e4;
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafbfc;
}
.drop-zone:hover, .drop-zone.over { border-color: #3b6fd4; background: #f0f4ff; }
.drop-zone .icon { font-size: 38px; margin-bottom: 10px; display: block; }
.drop-zone .main-text { font-size: 15px; color: #3d4d60; margin-bottom: 4px; }
.drop-zone .sub-text { font-size: 12px; color: #a0adb8; }
#file-input { display: none; }
.file-selected {
    margin-top: 12px; display: none; align-items: center; gap: 10px;
    padding: 10px 14px; background: #f0f4ff; border-radius: 8px;
    font-size: 13px; color: #3b6fd4;
}
.file-selected .fname { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-selected .remove {
    margin-left: auto; cursor: pointer; color: #a0adb8; font-size: 16px;
    flex-shrink: 0; border: none; background: none; padding: 0;
}
.file-selected .remove:hover { color: #e74c3c; }

/* ── Generate tab ── */
.selector-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.selector-label { font-size: 12px; font-weight: 700; color: #8a97a8; min-width: 56px; letter-spacing: 0.5px; }
.sel-btn {
    padding: 5px 14px;
    border: 1.5px solid #d8e0ea;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: #5a6a7a;
    background: white;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
}
.sel-btn:hover { border-color: #3b6fd4; color: #3b6fd4; }
.sel-btn.active { border-color: #3b6fd4; background: #eef4ff; color: #3b6fd4; }

.gen-divider { border: none; border-top: 1px solid #f0f2f5; margin: 16px 0; }
.section-label { font-size: 11px; font-weight: 700; color: #a0adb8; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 12px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
.form-grid .span2 { grid-column: 1 / -1; }
.f { display: flex; flex-direction: column; gap: 4px; }
.f label { font-size: 11px; font-weight: 700; color: #7a8a9a; letter-spacing: 0.3px; }
.f input, .f select {
    padding: 8px 10px;
    border: 1.5px solid #d8e0ea;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    color: #1a2332;
    outline: none;
    transition: border-color 0.15s;
    background: white;
}
.f input:focus, .f select:focus { border-color: #3b6fd4; }
.f input::placeholder { color: #c0cad8; }
.f input[readonly] { background: #f5f7fa; color: #7a8a9a; cursor: default; }

/* Shared */
.btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: #3b6fd4;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
    letter-spacing: 1px;
}
.btn:hover:not(:disabled) { background: #2d58b0; }
.btn:disabled { background: #c8d3df; cursor: not-allowed; }
.status { margin-top: 12px; padding: 11px 14px; border-radius: 8px; font-size: 13px; display: none; line-height: 1.5; }
.status.loading { background: #eef4ff; color: #3b6fd4; }
.status.success { background: #e8f8f0; color: #1a7a46; }
.status.error   { background: #fdf0f0; color: #c0392b; }
.spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #3b6fd4; border-top-color: transparent;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 6px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.companies {
    margin-top: 24px; padding-top: 18px; border-top: 1px solid #f0f2f5;
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
}
.co-tag { font-size: 11px; color: #a0adb8; background: #f5f7fa; padding: 3px 10px; border-radius: 12px; }
.hidden { display: none !important; }

.ic-group { display: flex; flex-direction: column; gap: 5px; }
.ic-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.ic-cat { font-size: 10px; font-weight: 700; color: #8a97a8; background: #f0f2f5; padding: 2px 8px; border-radius: 10px; white-space: nowrap; min-width: 46px; text-align: center; }
.ic-opt { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #1a2332; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.15s; }
.ic-opt:hover { background: #f0f4ff; }
.ic-opt input[type="radio"] { cursor: pointer; accent-color: #3b6fd4; }
.req { color: #e74c3c; margin-left: 1px; }
.f input.field-error, .f select.field-error { border-color: #e74c3c !important; background: #fff8f8; }
.ic-group.field-error { outline: 2px solid #e74c3c; border-radius: 6px; padding: 2px 4px; }
</style>
</head>
<body>
<div class="card wide" id="card">
    <div class="logo">
        <img src="/static/logo.png" alt="悠勢科技 Logo">
        <span>悠勢科技股份有限公司</span>
    </div>
    <h1>合約系統</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('generate', this)">產生新合約</button>
        <button class="tab-btn" onclick="switchTab('convert', this)">合約轉換</button>
    </div>

    <!-- ── Tab 1: 合約轉換 ── -->
    <div id="tab-convert" class="tab-content">
        <div class="flow">
            <span class="pill">對業主合約</span>
            <span class="arrow">→</span>
            <span class="pill">對悠勢合約</span>
        </div>
        <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <span class="icon">📄</span>
            <p class="main-text">點擊或拖曳上傳對業主合約</p>
            <p class="sub-text">支援格式：.docx（分潤版 / 租金版）</p>
        </div>
        <input type="file" id="file-input" accept=".docx">
        <div class="file-selected" id="file-selected">
            <span>📎</span>
            <span class="fname" id="fname"></span>
            <button class="remove" id="remove-btn" title="移除">✕</button>
        </div>
        <button class="btn" id="convert-btn" disabled onclick="doConvert()">產生對悠勢合約</button>
        <div class="status" id="convert-status"></div>
        <div class="companies">
            <span class="co-tag">志昌資產管理</span>
            <span class="co-tag">瀚昱開發</span>
            <span class="co-tag">毅源開發</span>
        </div>
    </div>

    <!-- ── Tab 2: 產生新合約 ── -->
    <div id="tab-generate" class="tab-content active">

        <!-- 合約設定 -->
        <div class="selector-row">
            <span class="selector-label">管理公司</span>
            <button class="sel-btn active" data-group="company" data-val="志昌" onclick="pickSel(this)">志昌</button>
            <button class="sel-btn" data-group="company" data-val="瀚昱" onclick="pickSel(this)">瀚昱</button>
            <button class="sel-btn" data-group="company" data-val="毅源" onclick="pickSel(this)">毅源</button>
            <button class="sel-btn" data-group="company" data-val="悠勢" onclick="pickSel(this)">悠勢</button>
        </div>
        <div class="selector-row">
            <span class="selector-label">合約類型</span>
            <button class="sel-btn active" data-group="ctype" data-val="rent" onclick="pickSel(this)">租賃型</button>
            <button class="sel-btn" data-group="ctype" data-val="profit" onclick="pickSel(this)">分潤型</button>
        </div>

        <hr class="gen-divider">

        <!-- 停車場資料 -->
        <div class="section-label">停車場資料</div>
        <div class="form-grid">
            <div class="f">
                <label>建物編號</label>
                <input type="text" name="building_id" placeholder="例：A001">
            </div>
            <div class="f">
                <label>建物名稱 <span class="req">*</span></label>
                <input type="text" name="building_name" placeholder="例：信義停車場" required>
            </div>
            <div class="f span2">
                <label>停車場地址 <span class="req">*</span></label>
                <input type="text" name="address" placeholder="例：臺北市中山區○○路1號">
            </div>
            <div class="f">
                <label>車位數</label>
                <input type="text" name="spots" placeholder="例：10">
            </div>
            <div class="f">
                <label>建物綁定電話</label>
                <input type="text" name="building_phone" placeholder="例：02-2345-6789">
            </div>
            <div class="f">
                <label>業務人員 <span class="req">*</span></label>
                <input type="text" name="sales" placeholder="">
            </div>
        </div>

        <hr class="gen-divider">

        <!-- 甲方（業主）資料 -->
        <div class="section-label">甲方（業主）資料</div>
        <div class="form-grid">
            <div class="f span2">
                <label>甲方名稱（公司名稱或姓名） <span class="req">*</span></label>
                <input type="text" name="party_a" placeholder="例：○○有限公司 或 王小明">
            </div>
            <div class="f">
                <label>負責人 <span class="req">*</span></label>
                <input type="text" name="owner" placeholder="">
            </div>
            <div class="f">
                <label>統編 / 身分證字號 <span class="req">*</span></label>
                <input type="text" name="id_number" placeholder="">
            </div>
            <div class="f">
                <label>聯絡電話</label>
                <input type="text" name="phone" placeholder="">
            </div>
            <div class="f">
                <label>Email</label>
                <input type="text" name="a_email" placeholder="">
            </div>
            <div class="f span2">
                <label>聯絡地址 <span class="req">*</span></label>
                <input type="text" name="contact_address" placeholder="">
            </div>
        </div>

        <hr class="gen-divider">

        <!-- 合約條件 -->
        <div class="section-label">合約條件</div>
        <div class="form-grid">

            <!-- 租賃型 -->
            <div class="f rent-only">
                <label>租金 <span class="req">*</span></label>
                <input type="text" name="amount" placeholder="例：50,000">
            </div>
            <div class="f rent-only">
                <label>最低保障收益</label>
                <input type="text" name="low_rev" placeholder="例：500">
            </div>
            <div class="f rent-only">
                <label>付款頻率 <span class="req">*</span></label>
                <select name="pay_freq" onchange="onPayFreqChange(this)">
                    <option value="">請選擇</option>
                    <option value="月繳">月繳</option>
                    <option value="季繳">季繳</option>
                    <option value="半年繳">半年繳</option>
                    <option value="年繳">年繳</option>
                </select>
            </div>
            <div class="f rent-only">
                <label>付款期間（月數，自動填入）</label>
                <input type="text" name="pay_period" id="pay-period" readonly placeholder="依付款頻率自動填入">
            </div>
            <div class="f rent-only">
                <label>付款日</label>
                <input type="number" name="pay_day" placeholder="例：5" min="1" max="31">
            </div>
            <div class="f rent-only">
                <label>付款方式 <span class="req">*</span></label>
                <select name="pay_method">
                    <option value="">請選擇</option>
                    <option value="匯款">匯款</option>
                    <option value="支票">支票</option>
                </select>
            </div>

            <!-- 分潤型 -->
            <div class="f profit-only hidden">
                <label>甲方分潤比例（%） <span class="req">*</span></label>
                <input type="text" name="party_a_percent" placeholder="例：70" oninput="calcPartyB(this)">
            </div>
            <div class="f profit-only hidden">
                <label>乙方分潤比例（%） <span class="req">*</span></label>
                <input type="text" name="party_b_percent" id="b-percent" placeholder="例：30">
            </div>

            <!-- 共用 -->
            <div class="f">
                <label>稅務 <span class="req">*</span></label>
                <select name="tax_type">
                    <option value="">請選擇</option>
                    <option value="稅前">稅前</option>
                    <option value="稅後">稅後</option>
                </select>
            </div>
            <div class="f span2">
                <label>所得代號 <span class="req">*</span></label>
                <div class="ic-group" id="ic-group">
                    <div class="ic-row">
                        <span class="ic-cat">個人</span>
                        <label class="ic-opt"><input type="radio" name="income_code" value="個人_空地租賃(51L)"> 空地租賃 (51L)</label>
                        <label class="ic-opt"><input type="radio" name="income_code" value="個人_建物租賃(51J)"> 建物租賃 (51J)</label>
                    </div>
                    <div class="ic-row">
                        <span class="ic-cat">法人</span>
                        <label class="ic-opt"><input type="radio" name="income_code" value="法人_00發票"> 00 發票</label>
                    </div>
                    <div class="ic-row">
                        <span class="ic-cat">管委會</span>
                        <label class="ic-opt"><input type="radio" name="income_code" value="管委會_空地租賃(51L)"> 空地租賃 (51L)</label>
                        <label class="ic-opt"><input type="radio" name="income_code" value="管委會_建物租賃(51J)"> 建物租賃 (51J)</label>
                        <label class="ic-opt"><input type="radio" name="income_code" value="管委會_00發票"> 00 發票</label>
                    </div>
                </div>
            </div>
        </div>

        <hr class="gen-divider">

        <!-- 收款帳戶 -->
        <div class="section-label">業主收款帳戶</div>
        <div class="form-grid">
            <div class="f span2">
                <label>銀行名稱（含分行）</label>
                <input type="text" name="bank_name" placeholder="例：國泰世華銀行 慶城分行">
            </div>
            <div class="f">
                <label>帳戶名稱</label>
                <input type="text" name="account_name" placeholder="">
            </div>
            <div class="f">
                <label>帳號</label>
                <input type="text" name="account_number" placeholder="">
            </div>
        </div>

        <hr class="gen-divider">

        <!-- 日期 -->
        <div class="section-label">日期</div>
        <div class="form-grid">
            <div class="f">
                <label>合約開始日</label>
                <input type="date" name="start_date">
            </div>
            <div class="f">
                <label>合約結束日</label>
                <input type="date" name="end_date">
            </div>
            <div class="f">
                <label>簽約日期</label>
                <input type="date" name="sign_date">
            </div>
        </div>

        <button class="btn" id="gen-btn" onclick="doGenerate()">產生合約</button>
        <div class="status" id="gen-status"></div>
    </div>
</div>

<script>
// ── Tab switching ──
function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('card').classList.toggle('wide', name === 'generate');
}

// ── Selector pills ──
var selected = { company: '志昌', ctype: 'rent' };

function pickSel(btn) {
    var group = btn.dataset.group;
    document.querySelectorAll('.sel-btn[data-group="' + group + '"]').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    selected[group] = btn.dataset.val;
    updateFields();
}

function updateFields() {
    var isRent = selected.ctype === 'rent';
    var isUspace = selected.company === '悠勢';
    document.querySelectorAll('.rent-only').forEach(function(el) { el.classList.toggle('hidden', !isRent); });
    document.querySelectorAll('.profit-only').forEach(function(el) { el.classList.toggle('hidden', isRent); });
    document.querySelectorAll('.uspace-only').forEach(function(el) { el.classList.toggle('hidden', !isUspace); });
    clearErrors();
}

// Auto-fill pay_period from pay_freq
var freqPeriodMap = { '月繳': '1', '季繳': '3', '半年繳': '6', '年繳': '12' };
function onPayFreqChange(sel) {
    var el = document.getElementById('pay-period');
    el.value = freqPeriodMap[sel.value] || '';
}

// ── Validation ──
function clearErrors() {
    document.querySelectorAll('.field-error').forEach(function(el) { el.classList.remove('field-error'); });
}

function validateForm() {
    clearErrors();
    var errors = [];
    var isRent = selected.ctype === 'rent';

    function chk(name, label) {
        var el = document.querySelector('#tab-generate [name="' + name + '"]');
        if (!el || !el.value.trim()) {
            if (el) el.classList.add('field-error');
            errors.push(label);
        }
    }

    chk('address',         '停車場地址');
    chk('sales',           '業務人員');
    chk('party_a',         '甲方名稱');
    chk('owner',           '負責人');
    chk('id_number',       '統編／身分證字號');
    chk('contact_address', '聯絡地址');
    chk('tax_type',        '稅務');

    var icChecked = document.querySelector('#tab-generate input[name="income_code"]:checked');
    if (!icChecked) {
        var ig = document.getElementById('ic-group');
        if (ig) ig.classList.add('field-error');
        errors.push('所得代號');
    }

    if (isRent) {
        chk('amount',     '租金');
        chk('pay_freq',   '付款頻率');
        chk('pay_method', '付款方式');
    } else {
        chk('party_a_percent', '甲方分潤比例');
        chk('party_b_percent', '乙方分潤比例');
    }

    return errors;
}

// Auto-calc 乙方% = 100 - 甲方%
function calcPartyB(input) {
    var a = parseFloat(input.value);
    var el = document.getElementById('b-percent');
    el.value = (!isNaN(a) && a >= 0 && a <= 100) ? (100 - a).toString() : '';
}

// ── Convert tab ──
var selectedFile = null;
var dropZone = document.getElementById('drop-zone');
var fileInput = document.getElementById('file-input');
var fileSelectedEl = document.getElementById('file-selected');
var fnameEl = document.getElementById('fname');
var convertBtn = document.getElementById('convert-btn');

fileInput.addEventListener('change', function(e) { if (e.target.files[0]) setFile(e.target.files[0]); });
document.getElementById('remove-btn').addEventListener('click', function(e) { e.stopPropagation(); clearFile(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('over'); });
dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(file) {
    if (!file.name.toLowerCase().endsWith('.docx')) {
        showStatus('convert-status', '請上傳 .docx 格式的檔案', 'error'); return;
    }
    selectedFile = file;
    fnameEl.textContent = file.name;
    fileSelectedEl.style.display = 'flex';
    convertBtn.disabled = false;
    document.getElementById('convert-status').style.display = 'none';
}

function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    fileSelectedEl.style.display = 'none';
    convertBtn.disabled = true;
    document.getElementById('convert-status').style.display = 'none';
}

async function doConvert() {
    if (!selectedFile) return;
    convertBtn.disabled = true;
    showStatus('convert-status', '<span class="spinner"></span>轉換中，請稍候…', 'loading');
    var fd = new FormData();
    fd.append('file', selectedFile);
    try {
        var res = await fetch('/convert', { method: 'POST', body: fd });
        if (!res.ok) {
            var err = await res.json().catch(function() { return { detail: '未知錯誤' }; });
            showStatus('convert-status', '✗ ' + err.detail, 'error');
        } else {
            var blob = await res.blob();
            var disp = res.headers.get('Content-Disposition') || '';
            var name = '對悠勢合約.docx';
            var m = disp.match(/filename\*=UTF-8''(.+)/i);
            if (m) name = decodeURIComponent(m[1]);
            downloadBlob(blob, name);
            showStatus('convert-status', '✓ 轉換完成！已下載：' + name, 'success');
        }
    } catch (e) {
        showStatus('convert-status', '✗ 網路錯誤：' + e.message, 'error');
    }
    convertBtn.disabled = false;
}

// ── Generate tab ──
async function doGenerate() {
    var btn = document.getElementById('gen-btn');
    var errors = validateForm();
    if (errors.length > 0) {
        showStatus('gen-status', '✗ 請填寫必填欄位：' + errors.join('、'), 'error');
        return;
    }
    btn.disabled = true;
    showStatus('gen-status', '<span class="spinner"></span>產生中，請稍候…', 'loading');

    var fd = new FormData();
    fd.append('company', selected.company);
    fd.append('contract_type', selected.ctype);
    // track which radio groups have been handled
    var radiosDone = {};
    document.querySelectorAll('#tab-generate input[name], #tab-generate select[name]').forEach(function(el) {
        if (el.type === 'radio') {
            if (!radiosDone[el.name]) {
                radiosDone[el.name] = true;
                var checked = document.querySelector('#tab-generate input[name="' + el.name + '"]:checked');
                fd.append(el.name, checked ? checked.value : '');
            }
        } else {
            fd.append(el.name, el.value);
        }
    });

    try {
        var res = await fetch('/generate', { method: 'POST', body: fd });
        if (!res.ok) {
            var err = await res.json().catch(function() { return { detail: '未知錯誤' }; });
            showStatus('gen-status', '✗ ' + err.detail, 'error');
        } else {
            var blob = await res.blob();
            var disp = res.headers.get('Content-Disposition') || '';
            var name = '新合約.docx';
            var m = disp.match(/filename\*=UTF-8''(.+)/i);
            if (m) name = decodeURIComponent(m[1]);
            downloadBlob(blob, name);
            showStatus('gen-status', '✓ 產生完成！已下載：' + name, 'success');
        }
    } catch (e) {
        showStatus('gen-status', '✗ 網路錯誤：' + e.message, 'error');
    }
    btn.disabled = false;
}

// ── Helpers ──
function downloadBlob(blob, name) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
}

function showStatus(id, html, type) {
    var el = document.getElementById(id);
    el.innerHTML = html;
    el.className = 'status ' + type;
    el.style.display = 'block';
}

// Clear error highlight when user edits a field
document.querySelectorAll('#tab-generate input, #tab-generate select').forEach(function(el) {
    el.addEventListener('input', function() { el.classList.remove('field-error'); });
    el.addEventListener('change', function() { el.classList.remove('field-error'); });
});
document.querySelectorAll('#tab-generate input[name="income_code"]').forEach(function(el) {
    el.addEventListener('change', function() {
        var ig = document.getElementById('ic-group');
        if (ig) ig.classList.remove('field-error');
    });
});
</script>
