<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合約自動產生器｜悠勢科技</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 44px 40px;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.logo { font-size: 13px; color: #aaa; margin-bottom: 6px; letter-spacing: 1px; }
h1 { font-size: 22px; color: #1a2332; margin-bottom: 4px; }
.tagline { font-size: 13px; color: #8a97a8; margin-bottom: 28px; }

.flow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    padding: 12px 0;
    border-top: 1px solid #f0f2f5;
    border-bottom: 1px solid #f0f2f5;
}
.pill {
    background: #eef4ff;
    color: #3b6fd4;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
}
.arrow { color: #c0cad8; font-size: 18px; }

.drop-zone {
    border: 2px dashed #d0d8e4;
    border-radius: 10px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafbfc;
    position: relative;
}
.drop-zone:hover, .drop-zone.over {
    border-color: #3b6fd4;
    background: #f0f4ff;
}
.drop-zone .icon { font-size: 40px; margin-bottom: 10px; display: block; }
.drop-zone .main-text { font-size: 15px; color: #3d4d60; margin-bottom: 4px; }
.drop-zone .sub-text { font-size: 12px; color: #a0adb8; }
#file-input { display: none; }

.file-selected {
    margin-top: 14px;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #f0f4ff;
    border-radius: 8px;
    font-size: 13px;
    color: #3b6fd4;
}
.file-selected .fname { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-selected .remove {
    margin-left: auto;
    cursor: pointer;
    color: #a0adb8;
    font-size: 16px;
    flex-shrink: 0;
    border: none;
    background: none;
    padding: 0;
}
.file-selected .remove:hover { color: #e74c3c; }

.btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    background: #3b6fd4;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
    letter-spacing: 1px;
}
.btn:hover:not(:disabled) { background: #2d58b0; }
.btn:disabled { background: #c8d3df; cursor: not-allowed; }

.status {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
    line-height: 1.5;
}
.status.loading { background: #eef4ff; color: #3b6fd4; }
.status.success { background: #e8f8f0; color: #1a7a46; }
.status.error   { background: #fdf0f0; color: #c0392b; }

.spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid #3b6fd4;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

.companies {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #f0f2f5;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
}
.co-tag {
    font-size: 11px;
    color: #a0adb8;
    background: #f5f7fa;
    padding: 3px 10px;
    border-radius: 12px;
}
</style>
</head>
<body>
<div class="card">
    <div class="logo">悠勢科技股份有限公司</div>
    <h1>合約自動產生器</h1>
    <p class="tagline">IPO 換約專案 ｜ 對業主合約 → 對悠勢合約</p>

    <div class="flow">
        <span class="pill">對業主合約</span>
        <span class="arrow">→</span>
        <span class="pill">對悠勢合約</span>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <span class="icon">📄</span>
        <p class="main-text">點擊或拖曳上傳對業主合約</p>
        <p class="sub-text">支援格式：.docx（分潤版 / 租金版）</p>
    </div>
    <input type="file" id="file-input" accept=".docx">

    <div class="file-selected" id="file-selected">
        <span>📎</span>
        <span class="fname" id="fname"></span>
        <button class="remove" id="remove-btn" title="移除">✕</button>
    </div>

    <button class="btn" id="convert-btn" disabled onclick="convert()">產生對悠勢合約</button>

    <div class="status" id="status"></div>

    <div class="companies">
        <span class="co-tag">志昌資產管理</span>
        <span class="co-tag">瀚昱開發</span>
        <span class="co-tag">毅源開發</span>
    </div>
</div>

<script>
let selectedFile = null;
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileSelected = document.getElementById('file-selected');
const fname = document.getElementById('fname');
const convertBtn = document.getElementById('convert-btn');
const statusEl = document.getElementById('status');

fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

document.getElementById('remove-btn').addEventListener('click', e => {
    e.stopPropagation();
    clearFile();
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(file) {
    if (!file.name.toLowerCase().endsWith('.docx')) {
        showStatus('請上傳 .docx 格式的檔案', 'error'); return;
    }
    selectedFile = file;
    fname.textContent = file.name;
    fileSelected.style.display = 'flex';
    convertBtn.disabled = false;
    statusEl.style.display = 'none';
}

function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    fileSelected.style.display = 'none';
    convertBtn.disabled = true;
    statusEl.style.display = 'none';
}

async function convert() {
    if (!selectedFile) return;
    convertBtn.disabled = true;
    showStatus('<span class="spinner"></span>轉換中，請稍候…', 'loading');

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
        const res = await fetch('/convert', { method: 'POST', body: formData });

        if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: '未知錯誤' }));
            showStatus('✗ ' + err.detail, 'error');
            convertBtn.disabled = false;
            return;
        }

        const blob = await res.blob();
        const disposition = res.headers.get('Content-Disposition') || '';
        let outName = '對悠勢合約.docx';
        const m = disposition.match(/filename\*=UTF-8''(.+)/i);
        if (m) outName = decodeURIComponent(m[1]);

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = outName; a.click();
        URL.revokeObjectURL(url);

        showStatus(`✓ 轉換完成！已下載：${outName}`, 'success');
    } catch (e) {
        showStatus('✗ 網路錯誤：' + e.message, 'error');
    }
    convertBtn.disabled = false;
}

function showStatus(html, type) {
    statusEl.innerHTML = html;
    statusEl.className = 'status ' + type;
    statusEl.style.display = 'block';
}
</script>
</body>
</html>
